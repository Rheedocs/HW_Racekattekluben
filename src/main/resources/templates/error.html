<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😼 Fatal Katastrofe</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-3px, -3px); }
            50% { transform: translate(3px, 3px); }
            75% { transform: translate(-3px, 3px); }
        }

        #error-img { animation: shake 0.1s linear infinite; }
    </style>
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div class="error-container">
        <img id="error-img" th:src="@{/images/laugh-point-3205881363.gif}" alt="Grinen kat" height="498" width="498"/>
        <h1>LOL! noget gik galt 🙀</h1>
        <div class="error error-centered" th:if="${fejl != null}">
            <p th:each="fejlBesked : ${fejl}" th:text="${fejlBesked}"></p>
        </div>
        <p th:if="${fejl == null}">Ukendt fejl... måske katten gjorde det 🐈</p>
        <a class="btn" th:href="${tilbage != null ? tilbage : '/'}">Tilbage</a>
    </div>
</main>
<script>
    const audio = new Audio('/sounds/laugh.mp3');
    audio.play();
</script>
</body>
</html>
