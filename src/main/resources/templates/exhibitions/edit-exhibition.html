<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Rediger udstilling</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Rediger udstilling</h2>
    <form th:action="@{/exhibitions/edit/{id}(id=${exhibition.id})}" th:object="${exhibition}" method="post">
        <input type="hidden" th:field="*{id}" />
        <label for="name">Navn:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <label for="date">Dato:</label>
        <input type="date" id="date" name="date"
               th:value="${#temporals.format(exhibition.date, 'yyyy-MM-dd')}" required>
        <label for="location">Lokation:</label>
        <input type="text" id="location" th:field="*{location}" required>
        <button type="submit">Gem ændringer</button>
    </form>
    <div style="margin-top: 16px; display: flex; gap: 8px;">
        <a th:href="@{/exhibitions}">Tilbage</a>
    </div>
</main>
</body>
</html>
