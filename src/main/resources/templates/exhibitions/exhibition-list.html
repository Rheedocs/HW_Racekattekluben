<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Udstillinger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div th:with="isAdmin=${session.member != null and session.member.role.name() == 'ADMIN'}">
        <h2>Udstillinger</h2>

        <h3>Kommende udstillinger</h3>
        <table class="exhibition-table">
            <thead>
            <tr>
                <th>Navn</th>
                <th>Dato</th>
                <th>Lokation</th>
                <th>Handlinger</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="exhibition : ${exhibitions}" th:if="${exhibition.upcoming}">
                <td th:text="${exhibition.name}"></td>
                <td th:text="${exhibition.date}"></td>
                <td th:text="${exhibition.location}"></td>
                <td class="action-col">
                    <a class="btn" th:href="@{/exhibitions/{id}(id=${exhibition.id})}">Se</a>
                    <a class="btn" th:if="${isAdmin}" th:href="@{/exhibitions/edit/{id}(id=${exhibition.id})}">Rediger</a>
                    <a class="btn" th:if="${isAdmin}"
                       th:href="@{/exhibitions/{id}/delete(id=${exhibition.id})}">Slet</a>
                </td>
            </tr>
            </tbody>
        </table>

        <h3>Tidligere udstillinger</h3>
        <table class="exhibition-table">
            <thead>
            <tr>
                <th>Navn</th>
                <th>Dato</th>
                <th>Lokation</th>
                <th>Handlinger</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="exhibition : ${exhibitions}" th:if="${!exhibition.upcoming}">
                <td th:text="${exhibition.name}"></td>
                <td th:text="${exhibition.date}"></td>
                <td th:text="${exhibition.location}"></td>
                <td class="action-col">
                    <a class="btn" th:href="@{/exhibitions/{id}(id=${exhibition.id})}">Se</a>
                    <a class="btn" th:if="${isAdmin}" th:href="@{/exhibitions/edit/{id}(id=${exhibition.id})}">Rediger</a>
                    <a class="btn" th:if="${isAdmin}"
                       th:href="@{/exhibitions/{id}/delete(id=${exhibition.id})}">Slet</a>
                </td>
            </tr>
            </tbody>
        </table>

        <a class="btn list-action" th:if="${isAdmin}" th:href="@{/exhibitions/add}">Opret ny udstilling</a>
    </div>
</main>
</body>
</html>
