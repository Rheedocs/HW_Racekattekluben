<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Medlemmer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div th:with="isAdmin=${session.member.role.name() == 'ADMIN'}">
        <h2>Medlemmer</h2>
        <table>
            <thead>
            <tr>
                <th th:if="${isAdmin}">Id</th>
                <th>Navn</th>
                <th>Email</th>
                <th th:if="${isAdmin}">Rolle</th>
                <th>Opdrætter</th>
                <th>Handlinger</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="member : ${members}">
                <td th:if="${isAdmin}" th:text="${member.id}"></td>
                <td th:text="${member.name}"></td>
                <td th:text="${member.email}"></td>
                <td th:if="${isAdmin}" th:text="${member.role}"></td>
                <td th:text="${member.breeder ? 'Ja' : 'Nej'}"></td>
                <td class="action-col">
                    <a class="btn" th:href="@{/cats/members/{id}(id=${member.id})}">Katte</a>
                    <a class="btn"
                       th:if="${isAdmin or session.member.id == member.id}"
                       th:href="@{/members/edit/{id}(id=${member.id})}">Rediger</a>
                    <a class="btn"
                       th:if="${isAdmin or session.member.id == member.id}"
                       th:href="@{/members/{id}/delete(id=${member.id})}">Slet</a>
                </td>
            </tr>
            </tbody>
        </table>
        <a class="btn list-action" th:if="${isAdmin}" th:href="@{/members/register}">Opret nyt medlem</a>
    </div>
</main>
</body>
</html>
