<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Opret konto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Opret konto</h2>
    <form th:action="@{/members/register}" method="post">
        <label for="name">Navn:</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"
               placeholder="navn@domæne.dk"
               required>
        <label for="password">Adgangskode:</label>
        <input type="password" id="password" name="password" required>
        <div style="display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px;">
            <input type="checkbox" id="breeder" name="breeder" value="true">
            <label for="breeder" style="font-weight: normal; display: inline;">
                Jeg er opdrætter
            </label>
        </div>
        <button type="submit">Opret konto</button>
    </form>
    <div style="margin-top: 16px;">
        <p>Har du allerede en konto? <a th:href="@{/login}">Log ind</a></p>
    </div>
</main>
</body>
</html>
