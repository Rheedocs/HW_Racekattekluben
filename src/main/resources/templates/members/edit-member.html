<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Rediger medlem</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Rediger medlem</h2>
    <form th:action="@{/members/edit/{id}(id=${member.id})}" th:object="${member}" method="post">
        <input type="hidden" th:field="*{id}" />
        <label for="name">Navn:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required>
        <label for="breeder">Opdrætter:</label>
        <input type="checkbox" id="breeder" th:field="*{breeder}">
        <button type="submit">Gem ændringer</button>
    </form>
    <a th:href="@{/members}">Tilbage</a>
</main>
</body>
</html>
