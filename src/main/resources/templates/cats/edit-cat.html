<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Rediger kat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Rediger kat</h2>
    <form th:action="@{/cats/{id}/edit(id=${cat.id})}" th:object="${cat}" method="post">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{memberId}" />
        <label for="name">Navn:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <label for="emsCode">EMS kode:</label>
        <input type="text" id="emsCode" th:field="*{emsCode}" required>
        <label for="birthdate">Fødselsdato:</label>
        <input type="date" id="birthdate" name="birthdate"
               th:value="${#temporals.format(cat.birthdate, 'yyyy-MM-dd')}" required>
        <label for="motherId">Mor:</label>
        <select id="motherId" name="motherId">
            <option value="">Ingen</option>
            <option th:each="c : ${allCats}"
                    th:if="${c.id != cat.id}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${cat.motherId != null && cat.motherId == c.id}"></option>
        </select>

        <label for="fatherId">Far:</label>
        <select id="fatherId" name="fatherId">
            <option value="">Ingen</option>
            <option th:each="c : ${allCats}"
                    th:if="${c.id != cat.id}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${cat.fatherId != null && cat.fatherId == c.id}"></option>
        </select>
        <label for="imagePath">Billede URL:</label>
        <input type="text" id="imagePath" th:field="*{imagePath}" placeholder="https://placecats.com/300/200">
        <button type="submit">Gem ændringer</button>
    </form>
    <div style="margin-top: 16px;">
        <a th:href="@{/cats/members/{id}(id=${cat.memberId})}">Tilbage</a>
    </div>
</main>
</body>
</html>
