<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Katte</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Katte</h2>
    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Navn</th>
            <th>EMS kode</th>
            <th>Fødselsdato</th>
            <th>Opdrætter</th>
            <th>Medlem</th>
            <th>Mor</th>
            <th>Far</th>
            <th>Handlinger</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${cats}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.emsCode}"></td>
            <td th:text="${cat.birthdate}"></td>
            <td th:text="${cat.breederName}"></td>
            <td th:text="${cat.memberId}"></td>
            <td th:text="${cat.motherId}"></td>
            <td th:text="${cat.fatherId}"></td>
            <td>
                <a class="btn" th:href="@{/cats/{id}/edit(id=${cat.id})}">Rediger</a>
                <form th:action="@{/cats/{id}/delete(id=${cat.id})}" method="post" style="display:contents;">
                    <button type="submit">Slet</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <div style="margin-top: 16px; display: flex; gap: 8px;">
        <a class="btn" th:href="@{/cats/members/{id}/add-cat(id=${memberId})}">Tilføj kat</a>
        <a class="btn" th:href="@{/members}">Tilbage</a>
    </div>
</main>
</body>
</html>
