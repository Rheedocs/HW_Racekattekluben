<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Katte</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div th:with="isAdmin=${session.member.role.name() == 'ADMIN'}">
        <h2>Katte</h2>
        <table>
            <thead>
            <tr>
                <th>Navn</th>
                <th>EMS kode</th>
                <th>Fødselsdato</th>
                <th>Opdrætter</th>
                <th>Mor</th>
                <th>Far</th>
                <th>Handlinger</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${cats}">
                <td th:text="${cat.name}"></td>
                <td th:text="${cat.emsCode}"></td>
                <td th:text="${cat.birthdate}"></td>
                <td th:text="${cat.breederName}"></td>
                <td th:text="${cat.motherName != null ? cat.motherName : '-'}"></td>
                <td th:text="${cat.fatherName != null ? cat.fatherName : '-'}"></td>
                <td class="action-col">
                    <a class="btn" th:href="@{/cats/{id}/detail(id=${cat.id})}">Se</a>
                    <a class="btn"
                       th:if="${isAdmin or session.member.id == cat.memberId}"
                       th:href="@{/cats/{id}/edit(id=${cat.id})}">Rediger</a>
                    <a class="btn"
                       th:if="${isAdmin or session.member.id == cat.memberId}"
                       th:href="@{/cats/{id}/delete(id=${cat.id})}">Slet</a>
                </td>
            </tr>
            </tbody>
        </table>
        <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start;">
            <a class="btn" th:if="${memberId != null and (isAdmin or session.member.id == memberId)}"
               th:href="@{/cats/members/{id}/add-cat(id=${memberId})}">Tilføj kat</a>
            <a th:href="@{/members}">Tilbage</a>
        </div>
    </div>
</main>
</body>
</html>
