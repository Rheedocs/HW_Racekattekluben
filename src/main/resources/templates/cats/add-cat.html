<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racekatteklubben - Tilføj kat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Tilføj kat</h2>
    <form th:action="@{/cats/add-cat}" th:object="${cat}" method="post">
        <label>Navn:
            <input type="text" th:field="*{name}" required/>
        </label>
        <label>EMS kode:
            <input type="text" th:field="*{emsCode}" required/>
        </label>
        <label>Fødselsdato:
            <input type="date" th:field="*{birthdate}" required/>
        </label>
        <label>Opdrætter navn:
            <input type="text" th:field="*{breederName}" required/>
        </label>
        <label>Billede URL:
            <input type="text" th:field="*{imagePath}" placeholder="https://placecats.com/300/200"/>
        </label>
        <input type="hidden" th:field="*{memberId}" />
        <button type="submit">Tilføj kat</button>
    </form>
    <div style="margin-top: 16px;">
        <a th:href="@{/cats/members/{id}(id=${cat.memberId})}">Tilbage</a>
    </div>
</main>
</body>
</html>
